<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Inventory Management System</h1>

    <!-- 添加商品表单 -->
    <div class="form-container">
        <h3>Add New Item</h3>
        <input type="text" id="itemId" placeholder="Item ID (unique)" required>
        <input type="text" id="itemName" placeholder="Item Name" required>
        <select id="categorySelect" required></select>
        <input type="number" id="quantity" placeholder="Quantity" min="0" required>
        <input type="number" id="price" placeholder="Price" min="0" step="0.01" required>
        <button onclick="addItem()">Add Item</button>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by name/ID/category..." oninput="searchItems()">
        <button onclick="showAllItems()">Show All Items</button>
    </div>

    <!-- 库存表格（用insertRow()动态渲染） -->
    <table id="inventoryTable" border="1">
        <thead>
            <tr>
                <th>Item ID</th>
                <th>Item Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- 引入编译后的JS文件 -->
    <script src="app.js"></script>
</body>
</html>
